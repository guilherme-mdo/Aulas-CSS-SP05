<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01 CSS</title>

    <style>
        p {
            color:blue;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: 30px;
        }
        #paragrafo-id {
            color: green;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
        }
        .centro {
            font-size: 20px;
            font-family: 'Times New Roman', Times, serif;
            color:blueviolet;
            text-align: center;
        }
        h3.centro {
            font-size: 40px;
            color: orange;
    
        }
        p.largo {
            color: brown;
            font-size: 300%;
        }
    </style>
</head>
<body>
    <!-- Introdução ao CSS  -->
    <h2>Exemplo de conteúdo alterado pelo CSS</h2>
    <p>Somente a dor coletiva gera união</p>

    <p>São Paulo</p>

    <p>Porto Alegre</p>

    <hr>

    <h2>Exemplo de seletor com ID</h2>

    <p id="paragrafo-id">Copa do mundo</p>

    <hr>

    <h2>Exemplo de seletor com class</h2>

    <h3 class="centro">Exemplo de título</h3>

    <p class="centro">O homem bom sofrerá por sua consciência</p>

    <p class="centro largo">Esse parágrafo pertence a duas classes ao mesmo tempo</p>
</body>
</html>
